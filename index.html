<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mijn Ultieme Tuin Planner</title>
<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

<style>
:root{--bg:#f0f4f1;--p:#2e5a1c;--ph:#214014;--a:#40c057;--ah:#2f9e44;--d:#e64980;--dh:#c2255c;--w:#f59f00;--gd:#2d3748;--gl:#edf2f7;--bc:#cbd5e0}
body{font-family:Arial,sans-serif;background:var(--bg);margin:0;padding:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;user-select:none}
#top-balk{background:var(--p);color:#fff;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.15);z-index:100}
#top-balk h1{margin:0;font-size:20px;white-space:nowrap}
.controls,.filter-groep,#laag-filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-groep select{padding:8px 12px;border-radius:5px;border:none;font-size:14px;font-weight:bold;cursor:pointer}
#laag-filters{background:rgba(255,255,255,.1);padding:5px 10px;border-radius:5px;font-size:13px;gap:8px}
#laag-filters label{cursor:pointer;display:flex;align-items:center;gap:3px}
.btn{background:var(--a);color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;font-weight:bold;font-size:14px;transition:background .2s}
.btn:hover{background:var(--ah)}.btn-secondary{background:#4a5568}.btn-secondary:hover{background:var(--gd)}
.btn-danger{background:var(--d)}.btn-danger:hover{background:var(--dh)}
#btn-gdrive{background:#4285F4;transition:background 0.3s;}
#btn-gdrive:hover{background:#3367d6;}
#werkruimte{display:flex;flex:1;height:calc(100vh - 60px);width:100vw;overflow:hidden}
details.menu-sectie{background:#fff;display:flex;flex-direction:column;border-bottom:2px solid #eeeff1}
details.menu-sectie>summary{padding:15px 20px;background:#f7fafc;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;font-weight:bold}
details.menu-sectie>summary::-webkit-details-marker{display:none}
details.menu-sectie>summary::after{content:'▼';font-size:12px;color:var(--p);transition:transform .2s}
details.menu-sectie[open]>summary::after{transform:rotate(180deg)}
details.menu-sectie>summary h2{margin:0;font-size:16px;color:var(--p);display:inline-block}
#zijbalk-links{width:280px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0;transition:width .3s ease}
.catalogus-items{padding:12px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;border-bottom:2px solid #e2e8f0;background:#fff}
.catalogus-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;border:1px dashed var(--bc);border-radius:6px;cursor:grab;background:#fafafa;transition:.2s;font-size:12px;font-weight:bold;color:var(--gd);touch-action:none}
.catalogus-item:hover{background:#eaf6ea;border-color:var(--a);transform:scale(1.02)}.catalogus-item:active{cursor:grabbing}
.catalogus-item-icon{font-size:1.8em;margin-bottom:4px;pointer-events:none}.catalogus-item span{pointer-events:none}
#weer-waarschuwingen{padding:10px;background:#fff5f5;border-bottom:1px solid #ffe3e3;display:none;gap:8px;justify-content:center;flex-wrap:wrap}
.weer-waarschuwing-icoon{font-size:20px;cursor:help;background:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.15);transition:transform .2s}
.weer-waarschuwing-icoon:hover{transform:scale(1.15)}
#weer-lijst{flex:1;overflow-y:auto;padding:15px;max-height:250px}
.weer-dag{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.weer-dag-datum{font-weight:bold;color:var(--gd)}.weer-dag-temp{font-weight:bold;color:#1c7ed6}
.weer-dag-rechts{display:flex;align-items:center;gap:10px}
.weer-dag-icons{display:flex;gap:4px}
.dag-waarschuwing{cursor:help;font-size:14px;transition:transform .2s}
.dag-waarschuwing:hover{transform:scale(1.2)}
#plattegrond-sectie{flex:1;background:#e2e8f0;overflow:auto;padding:40px;text-align:center;position:relative}
#tuin-container{position:relative;box-shadow:0 4px 20px rgba(0,0,0,.2);border:5px solid #fff;border-radius:8px;background:#fff;display:inline-block;margin:0 auto}
#tuin-afbeelding{display:block;width:100%;max-width:800px;height:auto}
#kompas-container{position:absolute;top:10px;left:-115px;background:rgba(255,255,255,.95);padding:8px;border-radius:6px;border:1px solid var(--bc);box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:50;width:95px;text-align:center}
#kompas-roos{width:66px;height:66px;border-radius:50%;border:2px solid var(--p);margin:4px auto;position:relative;background:radial-gradient(circle,#fff 50%,#f4fbf4 100%)}
.windstreek{position:absolute;font-size:9px;font-weight:bold;color:var(--p);transform:translate(-50%,-50%)}
.streek-n{top:8px;left:50%;color:red}.streek-o{top:50%;left:calc(100% - 10px)}.streek-z{top:calc(100% - 8px);left:50%}.streek-w{top:50%;left:10px}
#zijbalk-agenda{width:340px;background:#fff;box-shadow:-4px 0 15px rgba(0,0,0,.05);display:flex;flex-direction:column;border-left:1px solid #e2e8f0;flex-shrink:0;transition:width .3s}
#zijbalk-agenda details[open]{flex:1;overflow:hidden}#zijbalk-agenda details:not([open]){flex:none}
.search-container{position:relative;width:100%;padding:15px;background:#fafafa;border-bottom:1px solid #eeeff1;box-sizing:border-box}
.search-input{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--bc);box-sizing:border-box;font-size:14px;transition:border .2s}
.search-input:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(46,90,28,.15)}
#agenda-lijst{flex:1;overflow-y:auto;padding:20px;height:100%}
.agenda-item{padding:14px;border-bottom:1px solid #f0f0f0;border-left:5px solid #ccc;margin-bottom:12px;background:#fdfdfd;border-radius:0 6px 6px 0;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.02);transition:.2s}
.agenda-item:hover{transform:translateX(3px);background:#f4fbf4}.agenda-item.active-hover{border-left-width:9px;background:#eaf6ea}
.agenda-title{font-weight:bold;color:var(--p);font-size:16px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.task-tag-container{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.todo-item{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--gd)}.todo-item input{width:16px;height:16px;cursor:pointer}
.todo-item.completed{text-decoration:line-through;opacity:.6}
.task-tag{font-size:11px;padding:2px 6px;border-radius:4px;font-weight:bold;background:var(--gl);color:#4a5568;cursor:help}
.month-tag{background:var(--p)!important;color:#fff!important;display:inline-block;margin-right:5px}
.plant-marker{position:absolute;cursor:move;transform:translate(-50%,-50%);z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--p);font-weight:bold;line-height:1;text-align:center;transition:opacity .2s,filter .2s;touch-action:none;box-sizing:border-box}
.plant-marker .marker-icon{font-size:1.3em;margin-bottom:2px}
.plant-marker .marker-text{font-size:.85em;text-transform:uppercase;font-weight:800;background:rgba(255,255,255,.8);padding:1px 3px;border-radius:3px}
.plant-marker.vorm-rechthoek{border-radius:4px!important;border:2px dashed rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
.plant-marker.vorm-rechthoek .marker-icon{font-size:1.5em}
.marker-action-badges{display:flex;gap:2px;justify-content:center;margin-top:2px;pointer-events:none}
.action-mini-badge{font-size:10px;background:rgba(255,255,255,.9);border-radius:3px;padding:1px 2px;box-shadow:0 1px 3px rgba(0,0,0,.15);display:inline-block;line-height:1}
.plant-marker.selected{outline:3px solid var(--d)!important;outline-offset:3px;z-index:100}
.plant-marker:hover,.plant-marker.highlight{z-index:99;color:var(--a)}.plant-marker.search-hidden{opacity:.05;pointer-events:none}
.tooltip{display:none;position:fixed;background:#fff;color:#212529;padding:15px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.25);font-size:14px;line-height:1.5;z-index:9999;width:340px;pointer-events:none;border-left:5px solid var(--p);box-sizing:border-box}
.tooltip strong{display:block;font-size:16px;margin-bottom:4px;color:var(--p);border-bottom:1px solid #ddd}.tooltip-month-section{margin-top:5px;font-size:12px}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:22px;border-radius:8px;box-shadow:0 5px 30px rgba(0,0,0,.3);z-index:10000;width:440px;max-height:85vh;overflow-y:auto}
.modal h3{margin-top:0;color:var(--p)}.modal label{display:block;margin-top:12px;font-weight:bold;font-size:12px;color:#444}
.modal input[type="text"],.modal input[type="number"],.modal select,.modal textarea{width:100%;padding:8px;margin-top:4px;box-sizing:border-box;border:1px solid #ccc;border-radius:4px}
.matrix-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0}.matrix-month{width:80px;font-weight:bold;font-size:13px;color:var(--p)}
.matrix-options{display:flex;gap:8px;flex-wrap:wrap}.matrix-options label{display:flex;align-items:center;gap:2px;margin:0;font-weight:normal;font-size:11px;cursor:pointer}
.flex-input{display:flex;align-items:center;gap:10px;margin-top:4px}.flex-input>div{flex:1}
.modal input[type="color"]{border:none;width:40px;height:40px;cursor:pointer}.modal .modal-buttons{display:flex;gap:10px;margin-top:20px}
.history-section{border-top:1px solid #e2e8f0;margin-top:15px;padding-top:15px}
.history-list{max-height:160px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:5px;padding:8px;background:#fafafa;margin-top:5px;font-size:12px}
.history-item{margin-bottom:8px;border-bottom:1px dashed #eee;padding-bottom:6px}.history-item:last-child{border-bottom:none;margin-bottom:0}
.history-date{font-weight:bold;color:var(--p)}.history-img{max-width:100%;max-height:120px;display:block;margin-top:6px;border-radius:4px;border:1px solid var(--bc);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.img-preview-container{display:none;margin-top:8px;position:relative}.img-preview-container img{max-height:60px;border-radius:4px;border:1px solid #ccc}
.btn-remove-img{position:absolute;top:-5px;right:-5px;background:var(--d);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.log-dropzone{padding:8px;border:2px dashed transparent;border-radius:6px;transition:.2s;margin-top:8px}.log-dropzone.dragover{border-color:var(--a);background:#eaf6ea}
.tuin-dragover{outline:3px dashed var(--a)!important;outline-offset:-3px}
.touch-drag-avatar{position:fixed;pointer-events:none;z-index:10001;transform:translate(-50%,-50%);opacity:.8;font-size:24px;background:rgba(255,255,255,.9);padding:8px;border-radius:50%;box-shadow:0 4px 10px rgba(0,0,0,.3);display:none}
@media(max-width:900px){
    /* Laat de app op mobiel als een gewone website scrollen */
    body { height: auto; overflow: visible; }
    #werkruimte { flex-direction: column; height: auto; overflow: visible; }
    
    /* Bovenbalk knoppen netjes onder elkaar uitlijnen */
    #top-balk { flex-direction: column; padding: 15px; gap: 12px; }
    #top-balk h1 { text-align: center; font-size: 22px; margin-bottom: 5px; }
    .controls { justify-content: center; width: 100%; }
    
    /* Zijbalken nemen 100% breedte in */
    #zijbalk-links, #zijbalk-agenda { width: 100%; border: none; height: auto; flex: none; display: block!important; }
    #zijbalk-links { border-bottom: 3px solid var(--p); }
    #zijbalk-agenda { border-top: 3px solid var(--p); }
    
    /* Zorg dat de kaart ALTIJD een flink blok ruimte krijgt en horizontaal scrollbaar is */
    #plattegrond-sectie { padding: 15px 5px; width: 100%; box-sizing: border-box; min-height: 60vh; overflow-x: auto; overflow-y: hidden; }
    #tuin-container { min-width: 340px; margin: 0 auto; display: block; }
    #tuin-afbeelding { width: 100%; }
    
    /* Kompas netjes in beeld zetten ipv links buiten het scherm */
    #kompas-container { position: relative; left: auto; top: auto; margin: 0 auto 15px auto; display: block; width: 120px; }
    
    /* Zorg dat de invul-popups en kalender op het scherm passen */
    .modal { width: 95% !important; padding: 15px; max-height: 90vh; }
    .tooltip { width: 90%; left: 5% !important; top: 10% !important; }
}
    @media print{body{height:auto;overflow:visible;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}#top-balk,#zijbalk-links,.modal,.tooltip,#kompas-container,.controls,.touch-drag-avatar{display:none!important}#werkruimte{flex-direction:column;height:auto;display:block;overflow:visible}#plattegrond-sectie{padding:0;background:#fff;display:block;width:100%;overflow:visible;break-after:always}#tuin-container{box-shadow:none;border:1px solid #ccc;width:100%;margin:0}#tuin-afbeelding{max-width:100%}#zijbalk-agenda{width:100%;box-shadow:none;border:none;overflow:visible;flex:none;display:block!important}details.menu-sectie>summary,.search-container{display:none}#agenda-lijst{padding:0;overflow:visible}.agenda-item{border-left-width:3px!important;margin-bottom:15px;break-inside:avoid;border:1px solid #eee}.plant-marker{position:absolute!important}}
</style>
</head>
<body>
<div id="top-balk">
    <h1>🌳 Mijn Tuin Planner</h1>
    <div class="controls">
        <button class="btn btn-secondary" id="btn-gdrive" style="display:none;" onclick="handleAuthClick()">☁️ Login Drive</button>
        <div id="laag-filters">
            <label><input type="checkbox" value="Boom" checked>🌳</label><label><input type="checkbox" value="Struik" checked>🌿</label>
            <label><input type="checkbox" value="Bloem" checked>🌹</label><label><input type="checkbox" value="Kruid" checked>🌱</label>
        </div>
        <div class="filter-groep">
            <select id="filter-maand"><option value="alle">Alle Maanden</option><option value="Januari">Januari</option><option value="Februari">Februari</option><option value="Maart">Maart</option><option value="April">April</option><option value="Mei">Mei</option><option value="Juni">Juni</option><option value="Juli">Juli</option><option value="Augustus">Augustus</option><option value="September">September</option><option value="Oktober">Oktober</option><option value="November">November</option><option value="December">December</option></select>
        </div>
        <button class="btn" id="btn-add">➕ Element</button><button class="btn" id="btn-bloeikalender" style="background:#d6336c">🌸 Kalender</button>
        <button class="btn btn-secondary" id="btn-toggle-ui" style="background:var(--gd)">↔️ Focus</button>
        <button class="btn btn-secondary" id="btn-bg-upload">🖼️</button><input type="file" id="bg-file-input" accept="image/*" style="display:none">
        <button class="btn btn-secondary" onclick="window.print()">🖨️</button><button class="btn btn-secondary" id="btn-export">📤</button>
        <button class="btn btn-secondary" id="btn-import">📥</button><input type="file" id="import-file" accept=".json" style="display:none">
        <button class="btn btn-secondary" id="btn-undo">↩️</button><button class="btn btn-danger" id="btn-clear">🧹</button>
    </div>
</div>
<div id="werkruimte">
    <div id="zijbalk-links">
        <details class="menu-sectie" open><summary><h2>🌱 Snel catalogus</h2></summary>
            <div class="catalogus-items">
                <div class="catalogus-item" draggable="true" data-type="Boom" data-icon="🌳" data-color="#2e5a1c" data-name="Nieuwe Boom"><span class="catalogus-item-icon">🌳</span><span>Boom</span></div>
                <div class="catalogus-item" draggable="true" data-type="Struik" data-icon="🌿" data-color="#40c057" data-name="Nieuwe Struik"><span class="catalogus-item-icon">🌿</span><span>Struik</span></div>
                <div class="catalogus-item" draggable="true" data-type="Bloem" data-icon="🌹" data-color="#e64980" data-name="Nieuwe Bloem"><span class="catalogus-item-icon">🌹</span><span>Bloem</span></div>
                <div class="catalogus-item" draggable="true" data-type="Kruid" data-icon="🌱" data-color="#fab005" data-name="Nieuw Kruid"><span class="catalogus-item-icon">🌱</span><span>Kruid</span></div>
            </div>
        </details>
        <details class="menu-sectie" open><summary><div style="line-height:1.2"><h2>☁️ Weersvoorspelling</h2><small style="color:#718096;font-weight:normal">Komende 2 weken</small></div></summary>
            <div id="weer-waarschuwingen"></div><div id="weer-lijst"><p style="color:#777;font-style:italic;font-size:12px;text-align:center">Laden...</p></div>
        </details>
    </div>
    <div id="plattegrond-sectie">
        <div id="tuin-container">
            <div id="kompas-container"><span style="font-size:10px;font-weight:bold;display:block;margin-bottom:2px">🧭 Kompas</span>
                <div id="kompas-roos"><div class="windstreek streek-n">N</div><div class="windstreek streek-o">O</div><div class="windstreek streek-z">Z</div><div class="windstreek streek-w">W</div></div>
                <input type="range" id="kompas-slider" min="0" max="360" value="0" style="width:100%;margin:2px 0"><small id="kompas-waarde" style="font-size:9px;color:#555;font-weight:bold">0°</small>
            </div>
            <img id="tuin-afbeelding" src="tuin.jpeg" alt="Plattegrond">
            <div id="tooltip" class="tooltip"></div>
        </div>
    </div>
    <div id="zijbalk-agenda">
        <details class="menu-sectie" open><summary><h2 id="agenda-titel">📋 Agenda</h2></summary>
            <div class="search-container"><input type="text" id="agenda-search" class="search-input" placeholder="🔍 Zoek (Shift+Klik bulk sleep)..."></div>
            <div id="agenda-lijst"></div>
        </details>
    </div>
</div>
<div id="plant-modal" class="modal"><h3 id="modal-title">Element toevoegen</h3>
    <label>Naam</label><input id="p-name" placeholder="bijv. Hortensia">
    <label>Categorie</label><select id="p-type"><option value="Boom">🌳 Boom</option><option value="Struik">🌿 Struik</option><option value="Bloem">🌹 Bloem</option><option value="Kruid">🌱 Kruid</option></select>
    <label>Symbool</label><select id="p-custom-icon"><option value="standaard">⚙️ Volg categorie</option><optgroup label="Bomen"><option value="🌳">🌳 Loofboom</option><option value="🌸">🌸 Bloesem</option><option value="🌲">🌲 Naaldboom</option><option value="🌴">🌴 Palm</option><option value="🎋">🎋 Bamboe</option><option value="🪵">🪵 Wilg</option></optgroup><optgroup label="Struiken"><option value="🌿">🌿 Struik</option><option value="☘️">☘️ Klein</option><option value="🍃">🍃 Bladverliezend</option><option value="🌾">🌾 Siergras</option><option value="🪴">🪴 Potplant</option><option value="🌵">🌵 Cactus</option><option value="🍁">🍁 Varen/Herfst</option></optgroup><optgroup label="Bloemen"><option value="🌹">🌹 Roos</option><option value="🌻">🌻 Zonnebloem</option><option value="🌷">🌷 Tulp</option><option value="🌼">🌼 Margriet</option><option value="🌺">🌺 Exoot</option><option value="🪻">🪻 Hyacint</option><option value="🪷">🪷 Lotus</option><option value="💮">💮 Wit</option><option value="🏵️">🏵️ Rozet</option></optgroup><optgroup label="Moestuin"><option value="🌱">🌱 Zaailing</option><option value="🍅">🍅 Tomaat</option><option value="🥕">🥕 Wortel</option><option value="🥬">🥬 Sla</option><option value="🎃">🎃 Pompoen</option><option value="🧅">🧅 Ui</option><option value="🌽">🌽 Maïs</option><option value="🌶️">🌶️ Peper</option><option value="🍆">🍆 Aubergine</option><option value="🥔">🥔 Aardappel</option><option value="🥒">🥒 Komkommer</option><option value="🍓">🍓 Aardbei</option><option value="🍇">🍇 Druif</option><option value="🫐">🫐 Bes</option><option value="🍉">🍉 Meloen</option><option value="🍄">🍄 Paddenstoel</option></optgroup><optgroup label="Tuininrichting"><option value="🏡">🏡 Tuinhuis</option><option value="🪑">🪑 Terras</option><option value="⛲">⛲ Vijver</option><option value="🧱">🧱 Border</option><option value="🛤️">🛤️ Pad</option><option value="⛩️">⛩️ Pergola</option></optgroup></select>
    <label>Vorm</label><select id="p-vorm"><option value="cirkel">🟢 Cirkel</option><option value="rechthoek">🟦 Rechthoek</option></select>
    <div style="display:flex;gap:15px;margin-top:10px;padding:10px;background:#f7fafc;border:1px solid #e2e8f0;border-radius:5px"><label style="margin:0;font-weight:normal;display:flex;align-items:center;gap:5px;cursor:pointer" title="Groen in winter"><input type="checkbox" id="p-evergreen" checked> Groenblijvend</label><label style="margin:0;font-weight:normal;display:flex;align-items:center;gap:5px;cursor:pointer" title="Waarschuwing vorst"><input type="checkbox" id="p-frost"> Vorstgevoelig</label></div>

function gapiLoaded() { gapi.load('client', () => { gapiInited = true; maybeEnableButtons(); }); }

function gisLoaded() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.file',
        callback: (resp) => {
            if (resp.error) return alert("Fout bij inloggen.");
            
            // TRUC: Sla het token op in de browser-sessie inclusief de vervaltijd (1 uur)
            const expireTime = new Date().getTime() + (resp.expires_in * 1000);
            sessionStorage.setItem('tuinPlannerToken', JSON.stringify({ token: resp, expires: expireTime }));
            
            startDriveSessie(resp);
        },
    });
    gisInited = true;
    maybeEnableButtons();
}

function maybeEnableButtons() { 
    if (gapiInited && gisInited) {
        // Controleer of we nog een geldig token hebben na een page refresh
        const savedTokenData = sessionStorage.getItem('tuinPlannerToken');
        if (savedTokenData) {
            const parsedData = JSON.parse(savedTokenData);
            if (new Date().getTime() < parsedData.expires) {
                // Het token is nog geldig! Start de sessie direct, zonder te klikken.
                startDriveSessie(parsedData.token);
                return; 
            } else {
                // Token is ouder dan 1 uur en dus verlopen, ruim het op.
                sessionStorage.removeItem('tuinPlannerToken'); 
            }
        }
        
        // Geen geldig token? Toon dan gewoon de login knop
        document.getElementById('btn-gdrive').style.display = 'inline-block'; 
    } 
}

function startDriveSessie(resp) {
    gapi.client.setToken(resp);

    if (!gapi.client.getToken()) return;

    let tk = gapi.client.getToken().access_token;
    
    let query = encodeURIComponent("name='tuinplanner_backup.json' and trashed=false");
    
    // FIX: Controleer of het geheugen niet per ongeluk 'undefined' of 'null' als tekst heeft bewaard!
    if (driveFileId === 'undefined' || driveFileId === 'null') {
        driveFileId = null;
    }

    try {
        if (!driveFileId) {
            let s = await fetch("https://www.googleapis.com/drive/v3/files?q=" + query, { headers: { 'Authorization': 'Bearer ' + tk } }).then(r => r.json());
            if (s.files && s.files.length > 0) driveFileId = s.files[0].id;
        }
        
        if (driveFileId) {
            await fetch("https://www.googleapis.com/upload/drive/v3/files/" + driveFileId + "?uploadType=media", { method: 'PATCH', headers: { 'Authorization': 'Bearer ' + tk, 'Content-Type': 'application/json' }, body: bD });

        }
    } catch(e) { 
        console.error("Cloud Save Error:", e); 
    }
}

        console.error("Fout bij ophalen:", e);

}
