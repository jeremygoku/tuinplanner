<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Ultieme Tuin Planner</title>
    <!-- Link naar je externe CSS bestand -->
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#40c057">
  <link rel="apple-touch-icon" href="./icon-192.png">
    <!-- Google API scripts -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</head>
<body>
<div id="top-balk">
    <h1>🌳 Mijn Tuin Planner</h1>
    <div class="controls">
        <button class="btn btn-secondary" id="btn-gdrive" style="display:none;" onclick="handleAuthClick()">☁️</button>
        
       <button class="btn btn-secondary" id="btn-bg-upload" title="Wijzig plattegrond achtergrond">🗺️</button>
        <input type="file" id="bg-file-input" accept="image/*" style="display:none">

        <button class="btn btn-secondary" id="btn-weer-mobile" style="display:none;"></button>
        <button class="btn btn-secondary" id="btn-agenda-mobile" style="display:none;"></button>
        
        <div id="laag-filters">
            <label><input type="checkbox" value="Boom" checked>🌳</label><label><input type="checkbox" value="Struik" checked>🌿</label>
            <label><input type="checkbox" value="Bloem" checked>🌹</label><label><input type="checkbox" value="Kruid" checked>🌱</label>
        </div>
        <div class="filter-groep">
            <select id="filter-maand"><option value="alle">Alle Maanden</option><option value="Januari">Januari</option><option value="Februari">Februari</option><option value="Maart">Maart</option><option value="April">April</option><option value="Mei">Mei</option><option value="Juni">Juni</option><option value="Juli">Juli</option><option value="Augustus">Augustus</option><option value="September">September</option><option value="Oktober">Oktober</option><option value="November">November</option><option value="December">December</option></select>
        </div>
        <button class="btn" id="btn-add">➕ Element</button><button class="btn" id="btn-bloeikalender" style="background:#d6336c">🌸 Kalender</button>
        <button class="btn btn-secondary" id="btn-toggle-ui" style="background:var(--gd)">↔️ Focus</button>
        
        <button class="btn btn-secondary" id="btn-print" onclick="window.print()">🖨️</button>
        <button class="btn btn-secondary" id="btn-export">📤</button>
        <button class="btn btn-secondary" id="btn-import">📥</button><input type="file" id="import-file" accept=".json" style="display:none">
        <button class="btn btn-secondary" id="btn-undo">↩️</button><button class="btn btn-danger" id="btn-clear">🧹</button>
    </div>
</div>
<div id="werkruimte">
    <div id="zijbalk-links">
        <details class="menu-sectie" open><summary><h2>🌱 Snel catalogus</h2></summary>
            <div class="catalogus-items">
                <div class="catalogus-item" draggable="true" data-type="Boom" data-icon="🌳" data-color="#2e5a1c" data-name="Nieuwe Boom"><span class="catalogus-item-icon">🌳</span><span>Boom</span></div>
                <div class="catalogus-item" draggable="true" data-type="Struik" data-icon="🌿" data-color="#40c057" data-name="Nieuwe Struik"><span class="catalogus-item-icon">🌿</span><span>Struik</span></div>
                <div class="catalogus-item" draggable="true" data-type="Bloem" data-icon="🌹" data-color="#e64980" data-name="Nieuwe Bloem"><span class="catalogus-item-icon">🌹</span><span>Bloem</span></div>
                <div class="catalogus-item" draggable="true" data-type="Kruid" data-icon="🌱" data-color="#fab005" data-name="Nieuw Kruid"><span class="catalogus-item-icon">🌱</span><span>Kruid</span></div>
            </div>
        </details>
        <details class="menu-sectie" open><summary><div style="line-height:1.2"><h2>☁️ Weersvoorspelling</h2><small style="color:#718096;font-weight:normal">Komende 2 weken</small></div></summary>
            <div id="weer-waarschuwingen"></div><div id="weer-lijst"><p style="color:#777;font-style:italic;font-size:12px;text-align:center">Laden...</p></div>
        </details>
    </div>
    <div id="plattegrond-sectie">
        <div id="tuin-container">
            <div id="kompas-container"><span style="font-size:10px;font-weight:bold;display:block;margin-bottom:2px">🧭 Kompas</span>
                <div id="kompas-roos"><div class="windstreek streek-n">N</div><div class="windstreek streek-o">O</div><div class="windstreek streek-z">Z</div><div class="windstreek streek-w">W</div></div>
                <input type="range" id="kompas-slider" min="0" max="360" value="0" style="width:100%;margin:2px 0"><small id="kompas-waarde" style="font-size:9px;color:#555;font-weight:bold">0°</small>
            </div>
            <img id="tuin-afbeelding" src="tuin.jpeg" alt="Plattegrond">
            <div id="tooltip" class="tooltip"></div>
        </div>
    </div>
    <div id="zijbalk-agenda">
        <details class="menu-sectie" open><summary><h2 id="agenda-titel">🗓️ Agenda</h2></summary>
            <div class="search-container"><input type="text" id="agenda-search" class="search-input" placeholder="🔍 Zoek (Shift+Klik bulk sleep)..."></div>
            <div id="agenda-lijst"></div>
        </details>
    </div>
</div>
<div id="plant-modal" class="modal"><h3 id="modal-title">Element toevoegen</h3>
<label>Naam</label>
<div style="display:flex; gap:10px;">
    <input id="p-name" placeholder="bijv. Hortensia" style="flex:1;">
    <button id="btn-scan-plant" class="btn" style="background:var(--p); padding:8px 12px; font-size:14px;" title="Scan een plant met je camera">📸 Scan</button>
    <input type="file" id="scan-camera-input" accept="image/*" capture="environment" style="display:none;">
</div>
    <label>Categorie</label><select id="p-type"><option value="Boom">🌳 Boom</option><option value="Struik">🌿 Struik</option><option value="Bloem">🌹 Bloem</option><option value="Kruid">🌱 Kruid</option></select>
    <label>Symbool</label><select id="p-custom-icon"><option value="standaard">⚙️ Volg categorie</option><optgroup label="Bomen"><option value="🌳">🌳 Loofboom</option><option value="🌸">🌸 Bloesem</option><option value="🌲">🌲 Naaldboom</option><option value="🌴">🌴 Palm</option><option value="🎋">🎋 Bamboe</option><option value="🪵">🪵 Wilg</option></optgroup><optgroup label="Struiken"><option value="🌿">🌿 Struik</option><option value="☘️">☘️ Klein</option><option value="🍃">🍃 Bladverliezend</option><option value="🌾">🌾 Siergras</option><option value="🪴">🪴 Potplant</option><option value="🌵">🌵 Cactus</option><option value="🍁">🍁 Varen/Herfst</option></optgroup><optgroup label="Bloemen"><option value="🌹">🌹 Roos</option><option value="🌻">🌻 Zonnebloem</option><option value="🌷">🌷 Tulp</option><option value="🌼">🌼 Margriet</option><option value="🌺">🌺 Exoot</option><option value="🪻">🪻 Hyacint</option><option value="🪷">🪷 Lotus</option><option value="💮">💮 Wit</option><option value="🏵️">🏵️ Rozet</option></optgroup><optgroup label="Moestuin"><option value="🌱">🌱 Zaailing</option><option value="🍅">🍅 Tomaat</option><option value="🥕">🥕 Wortel</option><option value="🥬">🥬 Sla</option><option value="🎃">🎃 Pompoen</option><option value="🧅">🧅 Ui</option><option value="🌽">🌽 Maïs</option><option value="🌶️">🌶️ Peper</option><option value="🍆">🍆 Aubergine</option><option value="🥔">🥔 Aardappel</option><option value="🥒">🥒 Komkommer</option><option value="🍓">🍓 Aardbei</option><option value="🍇">🍇 Druif</option><option value="🫐">🫐 Bes</option><option value="🍉">🍉 Meloen</option><option value="🍄">🍄 Paddenstoel</option></optgroup><optgroup label="Tuininrichting"><option value="🏡">🏡 Tuinhuis</option><option value="🪑">🪑 Terras</option><option value="⛲">⛲ Vijver</option><option value="🧱">🧱 Border</option><option value="🛤️">🛤️ Pad</option><option value="⛩️">⛩️ Pergola</option></optgroup></select>
    
    <!-- VORM VERBORGEN -->
    <div style="display:none;">
        <label>Vorm</label><select id="p-vorm"><option value="cirkel">🟢 Cirkel</option><option value="rechthoek">🟦 Rechthoek</option></select>
    </div>

    <div style="display:flex;gap:15px;margin-top:10px;padding:10px;background:#f7fafc;border:1px solid #e2e8f0;border-radius:5px"><label style="margin:0;font-weight:normal;display:flex;align-items:center;gap:5px;cursor:pointer" title="Groen in winter"><input type="checkbox" id="p-evergreen" checked> Groenblijvend</label><label style="margin:0;font-weight:normal;display:flex;align-items:center;gap:5px;cursor:pointer" title="Waarschuwing vorst"><input type="checkbox" id="p-frost"> Vorstgevoelig</label></div>
    <label>Onderhoud (per maand)</label><div id="matrix-container" style="margin-top:5px;border:1px solid #e2e8f0;padding:10px;border-radius:5px;max-height:200px;overflow-y:auto"></div>
    
    <!-- KLEUR VERBORGEN, MAAR AANTAL BEHOUDEN -->
    <div class="flex-input"><div><label>Aantal</label><div style="display:flex;gap:10px;align-items:center;margin-top:4px"><input type="color" id="p-color" value="#40c057" style="display:none;"><input type="number" id="p-count" min="1" value="1"></div></div></div>
    
    <div class="flex-input" style="margin-top:10px"><div><label id="label-breedte">Grootte (px)</label><input type="range" id="p-size" min="25" max="250" value="40"></div><div id="hoogte-container" style="display:none"><label>Hoogte (px)</label><input type="range" id="p-height" min="25" max="250" value="40"></div></div>
    <label>Notities</label><textarea id="p-info" rows="2"></textarea>
    
    <div class="history-section" id="p-history-section">
        <label>📜 Logboek</label>
        <div class="history-list" id="p-history-list"></div>
        <div id="p-log-dropzone" class="log-dropzone">
            <div id="p-log-img-preview-container" class="img-preview-container">
                <img id="p-log-img-preview-src">
                <button class="btn-remove-img" id="btn-clear-log-img">✖</button>
            </div>
            <div style="display:flex; gap:6px; margin-top:6px; width:100%;">
                <input id="p-new-log" placeholder="Notitie" style="flex:1; min-width:0;">
                
                <button class="btn btn-secondary" id="btn-add-log-camera" style="padding:6px; background:#2b6cb0" title="Maak foto">📷</button>
                <input type="file" id="p-new-log-camera-file" accept="image/*" capture="environment" style="display:none">
                
                <button class="btn btn-secondary" id="btn-add-log-img" style="padding:6px" title="Kies uit galerij">🖼️</button>
                <input type="file" id="p-new-log-file" accept="image/*" style="display:none">
                
                <button class="btn" id="btn-add-log" style="padding:6px 10px">Toevoegen</button>
            </div>
        </div>
    </div>
    
    <div class="modal-buttons"><button class="btn" id="btn-save">Opslaan</button><button class="btn btn-danger" id="btn-delete" style="display:none">Wissen</button><button class="btn" id="btn-cancel" style="background:#aaa">Annuleren</button></div>
</div>
<div id="bloei-modal" class="modal" style="width:650px"><h3 style="margin-bottom:5px">🌸 Bloeikalender</h3><p style="font-size:12px;color:#555;margin-top:0">Wanneer bloeien planten op basis van de ingestelde kleur.</p><div id="bloei-content" style="margin-top:15px;max-height:50vh;overflow-y:auto;overflow-x:hidden;padding-right:5px"></div><div class="modal-buttons" style="margin-top:20px"><button class="btn" id="btn-sluit-bloei">Sluiten</button></div></div>
<div id="touch-drag-avatar" class="touch-drag-avatar"></div>

<!-- Link naar je externe JavaScript bestand -->
<!-- De Modulaire Architectuur van TuinPlanner -->
<script src="db.js"></script>
<script src="cloud.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
<script src="ui.js"></script>
<script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker geregistreerd!', reg))
          .catch(err => console.error('Service Worker registratie mislukt:', err));
      });
    }
  </script>
</body>
</html>
